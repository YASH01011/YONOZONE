<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YONO ZONE | Secure Download</title>
    <style>
        body { background-color: #0b0b0b; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .box { background: #1a1a1a; padding: 40px; border-radius: 25px; border: 2px solid #ff0000; width: 90%; max-width: 350px; }
        .icon { width: 100px; height: 100px; border-radius: 20px; margin-bottom: 20px; border: 3px solid #333; }
        .timer { font-size: 30px; font-weight: bold; color: #ff0000; margin: 20px 0; }
        .btn { display: none; background: #ff0000; color: white; text-decoration: none; padding: 15px 30px; border-radius: 50px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="box">
        <img id="appIcon" src="" class="icon">
        <h2 id="appName">Loading...</h2>
        <div id="status">Generating Download Link...</div>
        <div id="timer" class="timer">5</div>
        <a href="#" id="dlBtn" class="btn">INSTALL NOW</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('appName').innerText = params.get('name') || "Application";
        document.getElementById('appIcon').src = params.get('img') || "https://via.placeholder.com/100";
        const url = params.get('url');

        let timeLeft = 5;
        const countdown = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                document.getElementById('timer').style.display = "none";
                document.getElementById('status').innerText = "Link Ready!";
                const btn = document.getElementById('dlBtn');
                btn.style.display = "inline-block";
                btn.href = url;
            }
        }, 1000);
    </script>
</body>
</html>
